name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.0.0)"
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: correcteur-grammalecte.exe
            archive: correcteur-grammalecte-windows.zip
          - os: macos-latest
            artifact: "Correcteur Grammalecte.app"
            archive: correcteur-grammalecte-macos.zip
          - os: ubuntu-latest
            artifact: correcteur-grammalecte
            archive: correcteur-grammalecte-linux.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libglib2.0-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            libgl1 libegl1

      - name: Install Python dependencies
        run: pip install PyQt6 pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\${{ matrix.artifact }}" -DestinationPath "${{ matrix.archive }}"

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          zip -r "../${{ matrix.archive }}" "${{ matrix.artifact }}"

      - name: Archive (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "../${{ matrix.archive }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          files: |
            correcteur-grammalecte-windows.zip/correcteur-grammalecte-windows.zip
            correcteur-grammalecte-macos.zip/correcteur-grammalecte-macos.zip
            correcteur-grammalecte-linux.zip/correcteur-grammalecte-linux.zip
